name: Teste 2 - Angular CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: Teste 2/app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Teste 2/app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Run unit tests (headless)
        run: npm run test:headless

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload playwright-report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-teste2-${{ job.status }}
          path: Teste 2/app/playwright-report/
          retention-days: 7
